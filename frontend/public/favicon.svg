<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="cap" x1="16" y1="12" x2="48" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Graduation cap body -->
  <polygon points="32,14 10,26 32,38 54,26" fill="url(#cap)" opacity="0.95"/>
  <!-- Cap brim shadow -->
  <polygon points="32,38 10,26 10,30 32,42 54,30 54,26" fill="#FFFFFF" opacity="0.3"/>
  <!-- Tassel string -->
  <line x1="32" y1="14" x2="42" y2="14" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="14" x2="42" y2="28" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="42" cy="30" r="2.5" fill="#FCD34D"/>
  <!-- Building columns (college) -->
  <rect x="22" y="42" width="4" height="12" rx="1" fill="#FFFFFF" opacity="0.85"/>
  <rect x="30" y="42" width="4" height="12" rx="1" fill="#FFFFFF" opacity="0.85"/>
  <rect x="38" y="42" width="4" height="12" rx="1" fill="#FFFFFF" opacity="0.85"/>
  <!-- Building base -->
  <rect x="18" y="53" width="28" height="3" rx="1.5" fill="#FFFFFF" opacity="0.7"/>
  <!-- Building top -->
  <polygon points="20,42 32,36 44,42" fill="#FFFFFF" opacity="0.6"/>
</svg>